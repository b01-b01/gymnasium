---
- name: Deploy Gymnasium Application (3-Tier Architecture)
  hosts: localhost
  connection: local
  become: no

  vars:
    docker_user: "sobreiraa12344"
    network_name: "gym_network"

  tasks:
    - name: 1. Garantir que a rede Docker existe
      docker_network:
        name: "{{ network_name }}"
        state: present

    # =========================================================================
    # BLOCO PRINCIPAL: Tenta fazer o deploy dos processos da aplicação
    # =========================================================================
    - block:
        - name: 2. Camada de Dados - Levantar Postgres (Imagem Oficial)
          docker_container:
            name: db
            image: postgres:15
            state: started
            restart_policy: always
            networks:
              - name: "{{ network_name }}"
            ports:
              - "5432:5432"
            env:
              POSTGRES_USER: "postgres"
              POSTGRES_PASSWORD: "janeiro2004"
              POSTGRES_DB: "GymApp"
            volumes:
              - gym_db_data:/var/lib/postgresql/data

        - name: 3. Camada Backend - Gymnasium API
          docker_container:
            name: gym-backend
            image: "{{ docker_user }}/gym-backend:latest"
            state: started
            pull: true
            restart_policy: always
            networks:
              - name: "{{ network_name }}"
            ports:
              - "8000:8000"
            env:
              DATABASE_URL: "postgresql://postgres:janeiro2004@db:5432/GymApp"

        - name: 4. Camada Frontend - Website
          docker_container:
            name: gym-frontend
            image: "{{ docker_user }}/gym-frontend:latest"
            state: started
            pull: true
            restart_policy: always
            networks:
              - name: "{{ network_name }}"
            ports:
              - "3001:80"

        - name: 5. Limpar imagens antigas (Opcional - poupa espaço)
          docker_prune:
            images: yes
            images_filters:
              dangling: false

    # =========================================================================
    # BLOCO DE RESCUE (ROLLBACK): Só é executado se alguma tarefa acima falhar
    # =========================================================================
      rescue:
        - name: 🚨 FALHA DETETADA - A iniciar limpeza de emergência do projeto
          debug:
            msg: "Ocorreu um erro no deploy (porta ocupada ou falha de arranque). A remover containers do projeto..."

        - name: Remover os containers do projeto Gymnasium (Mantendo o Jenkins Intacto)
          docker_container:
            name: "{{ item }}"
            state: absent
            force_kill: yes
          loop:
            - db
            - gym-backend
            - gym-frontend

        - name: Forçar falha no Jenkins para marcar o Build como vermelho
          fail:
            msg: "O deploy falhou catastroficamente, mas o Rollback limpou o sistema com sucesso para evitar portas presas!"